<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doguinho</title>
</head>
<body>
    <h2>Doguinho</h2>
    <input type="text" id="id" placeholder="Insira o ID">
    <button onclick="mostrarImagem()">Mostrar</button>
    <div style="margin-top: 20px;">
        <img id="dog" src="" alt="Doguinho" style="max-width: 100%; display: none;">
    </div>

    <script>
        async function mostrarImagem() {
            const id = document.getElementById('id').value;
            const resposta = await fetch(`/dog/${id}`);
            const dados = await resposta.json();

            const img = document.getElementById('dog');
            img.src = dados.url;
            img.style.display = 'block';
        }
    </script>
</body>
</html>
